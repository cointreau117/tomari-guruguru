<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ぐるぐるDancin'なぎさん</title>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  img { -webkit-user-drag: none; }
  @media (prefers-reduced-motion: no-preference) {
    .bob { animation: bob 3.4s ease-in-out infinite; }
    @keyframes bob {
      0%, 100% { translate: 0 0; }
      50% { translate: 0 -1.2vmin; }
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.35; }
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translate(0, 0) scale(0.6) rotate(0deg); }
      15%  { opacity: 1; }
      100% { opacity: 0; transform: translate(var(--dx, 0), -180px) scale(1.15) rotate(var(--dr, 0deg)); }
    }
  }
  /* 狭い画面（スマホ）では下部バーの音量メーターを省いて footprint を抑える */
  @media (max-width: 480px) {
    .vol-meter { display: none !important; }
    /* 狭幅では audio プレーヤーがほぼ全幅になり下中央バーと重なるので、
       ファイル読込後はバーを audio の上へ持ち上げる */
    .ctrl-bar.has-audio { bottom: 88px !important; }
  }
  /* Tweaksパネル: iOS Safari の 100vh 問題（ツールバー裏を含む高さ）で閉じる✕が
     画面外に隠れるのを防ぐため、可視領域基準の 100dvh で上書き（基盤 tweaks-panel.jsx は触らない） */
  .twk-panel { max-height: calc(100dvh - 32px) !important; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="src/tweaks-panel.jsx"></script>
<script type="module" src="src/avatar-app.jsx"></script>
</body>
</html>
